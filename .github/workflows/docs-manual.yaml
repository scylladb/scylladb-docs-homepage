name: "Docs / Publish docs.scylladb.com/manual"

permissions:
  contents: write

env:
  FLAG: 'manual'

on:
  push:
    branches:
      - main
    paths:
      - "docs/_static/data/manual_doc_versions.json"
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          fetch-depth: 0
          submodules: true

      - name: Fetch submodules latest version
        run: |
          git submodule sync
          git submodule update --init --remote

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up env
        run: make -C submodules/scylladb/docs FLAG="${{ env.FLAG }}" setupenv

      - name: Patch conf.py to set tag from env var
        run: |
          python3 -c "
          p = 'submodules/scylladb/docs/conf.py'
          t = open(p).read()
          t = t.replace(\"FLAG = os.getenv('FLAG', 'manual')\", \"FLAG = os.getenv('FLAG', 'manual')\nif FLAG:\n    tags.add(FLAG)\")
          open(p, 'w').write(t)
          "

      - name: Build docs
        run: |
          make -C submodules/scylladb/docs setup
          cd submodules/scylladb/docs && FLAG=${{ env.FLAG }} uv run sphinx-multiversion . _build/dirhtml -D html_theme_options.collapse_navigation='false' -D html_theme_options.navigation_depth=3 -c ./

      - name: Build redirects
        run: make -C submodules/scylladb/docs FLAG="${{ env.FLAG }}" redirects

      - name: Deploy docs to GitHub Pages
        run: ./scripts/deploy_manual.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
