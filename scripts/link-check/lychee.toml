# lychee configuration for the weekly link check.
# Reference: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml

# Be polite to upstream sites.
max_concurrency = 2
max_redirects = 5
timeout = 30

# Fail fast on transient errors
# Treat these as healthy. Many docs links return 403/429 to bots without it
# meaning the page is broken; rate limiting and bot detection are common.
accept = [
  "200..=299",
  "403",
  "429",
]

# Skip mailto links and loopback URLs.
include_mail = false
exclude_loopback = true

exclude = [
  # Localhost dev preview URLs. lychee's `exclude_loopback` covers
  # 127.0.0.0/8 but not the all-zeros address.
  "^https?://0\\.0\\.0\\.0",

  # downloads.scylladb.com is an S3 bucket served via CloudFront.
  # Directory URLs (e.g. /downloads/scylla-doctor/rpm/) have no index.html
  # object, so S3 returns a 404.
  "^https?://downloads\\.scylladb\\.com/",

  # CarePet tutorial (iot.scylladb.com) — broken links pending upstream fix
  # in https://github.com/scylladb/care-pet:
  #
  # docs/build-with-cpp.md: the scylla-cpp-driver repo was renamed to cpp-driver.
  # Replace with: https://github.com/scylladb/cpp-driver
  "^https://github\\.com/scylladb/scylla-cpp-driver$",
  #
  # docs/build-with-python.md: Cassandra reorganised their docs and the
  # /cassandra/tools/cqlsh.html path no longer exists.
  # Replace with: https://opensource.docs.scylladb.com/stable/cql/cqlsh.html
  "^https://cassandra\\.apache\\.org/doc/latest/cassandra/tools/cqlsh\\.html$",
]

# Identify ourselves so server admins can contact us if needed.
user_agent = "scylladb-docs-link-check (+https://github.com/scylladb/scylladb-docs-homepage)"
