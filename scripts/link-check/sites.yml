# Sites checked by the weekly link-check workflow.
#
# Each entry has:
#   name  Display name shown in the GitHub issue title and body.
#   slug  Stable identifier used for the per-site GitHub label
#         `link-check:<slug>`. Keep slugs short and unique. Renaming a slug
#         orphans existing issues from the new label, so prefer not to.
#   url   URL passed to lychee. Prefer the site's sitemap so every page is
#         crawled. The canonical prefix used for display in the issue body
#         is derived from this URL (a trailing `sitemap.xml` is stripped).

sites:
  # Core docs
  - name: ScyllaDB Documentation
    slug: docs
    url: https://docs.scylladb.com/stable/sitemap.xml

  - name: ScyllaDB Manual
    slug: manual
    url: https://docs.scylladb.com/manual/stable/sitemap.xml

  - name: ScyllaDB Cloud Documentation
    slug: cloud
    url: https://cloud.docs.scylladb.com/stable/sitemap.xml

  - name: Sphinx ScyllaDB Theme
    slug: sphinx-theme
    url: https://sphinx-theme.scylladb.com/stable/sitemap.xml

  # ScyllaDB Developers: ~40 false positives per run; needs `html_baseurl`
  # fixed in scylladb-docs-developers' conf.py. Re-add once that ships.
